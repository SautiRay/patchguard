version: '3.8'

services:

  api:
    build: .
    container_name: patchguard-api
    env_file:
      - .env
    volumes:
      - ~/.ssh:/root/.ssh:ro
      - /opt/patch-manager:/opt/patch-manager:ro
      - /var/log/patch-manager-cron.log:/var/log/patch-manager-cron.log:ro
    restart: unless-stopped
    networks:
      - patchguard-net

  prometheus:
    image: prom/prometheus:latest
    container_name: patchguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - patchguard-net

  grafana:
    image: grafana/grafana:latest
    container_name: patchguard-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=patchguard2026
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - patchguard-net

  nginx:
    image: nginx:alpine
    container_name: patchguard-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/patchguard.conf:/etc/nginx/conf.d/default.conf
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - patchguard-net


networks:
  patchguard-net:
    driver: bridge

volumes:
  grafana-data:
