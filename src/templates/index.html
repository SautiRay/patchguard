<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1B2A4A">
  <title>PatchGuard</title>
  <link rel="manifest" href="/static/manifest.json">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0F172A;
      color: #E2E8F0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1B2A4A;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #0D9488;
    }
    header h1 { font-size: 1.4rem; color: #fff; }
    header h1 span { color: #0D9488; }
    #last-update { font-size: 0.8rem; color: #64748B; }

    /* ── Global status banner ── */
    #global-status {
      margin: 1.2rem 1.5rem 0;
      padding: 0.9rem 1.2rem;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      transition: background 0.5s;
    }
    .status-ok    { background: #064E3B; color: #6EE7B7; }
    .status-alert { background: #7F1D1D; color: #FCA5A5; }
    .status-load  { background: #1E293B; color: #94A3B8; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
      padding: 1.2rem 1.5rem;
    }

    /* ── Server card ── */
    .card {
      background: #1E293B;
      border-radius: 10px;
      padding: 1.2rem;
      border-left: 4px solid #334155;
      transition: border-color 0.3s;
    }
    .card.online  { border-left-color: #0D9488; }
    .card.alert   { border-left-color: #EF4444; }
    .card.offline { border-left-color: #64748B; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
    }
    .card-name { font-weight: 700; font-size: 1rem; color: #F1F5F9; }
    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }
    .badge-online  { background: #064E3B; color: #6EE7B7; }
    .badge-offline { background: #1E293B; color: #64748B; }
    .badge-alert   { background: #7F1D1D; color: #FCA5A5; }

    .card-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      color: #94A3B8;
      margin: 0.3rem 0;
    }
    .card-row span:last-child { color: #E2E8F0; font-weight: 600; }
    .patches-num { font-size: 1.6rem; font-weight: 800; }
    .patches-zero  { color: #0D9488; }
    .patches-alert { color: #EF4444; }

    .lynis-bar {
      margin-top: 0.6rem;
      background: #334155;
      border-radius: 999px;
      height: 6px;
    }
    .lynis-fill {
      height: 6px;
      border-radius: 999px;
      background: #0D9488;
      transition: width 1s;
    }

    /* ── Actions ── */
    .actions {
      padding: 0 1.5rem 1.2rem;
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.7rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover   { opacity: 0.85; }
    .btn:active  { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-teal  { background: #0D9488; color: #fff; }
    .btn-blue  { background: #1E4D8C; color: #fff; }
    .btn-red   { background: #DC2626; color: #fff; }
    .btn-gray  { background: #334155; color: #E2E8F0; }

    /* ── Logs panel ── */
    #logs-panel {
      margin: 0 1.5rem 1.5rem;
      background: #0F172A;
      border: 1px solid #1E293B;
      border-radius: 10px;
      padding: 1rem;
      display: none;
    }
    #logs-panel h3 {
      color: #0D9488;
      font-size: 0.9rem;
      margin-bottom: 0.6rem;
    }
    #logs-content {
      font-family: 'Consolas', monospace;
      font-size: 0.78rem;
      color: #7DD3FC;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    /* ── Output panel ── */
    #output-panel {
      margin: 0 1.5rem 1.5rem;
      background: #0F172A;
      border: 1px solid #0D9488;
      border-radius: 10px;
      padding: 1rem;
      display: none;
    }
    #output-panel h3 { color: #0D9488; font-size: 0.9rem; margin-bottom: 0.6rem; }
    #output-content {
      font-family: 'Consolas', monospace;
      font-size: 0.78rem;
      color: #6EE7B7;
      max-height: 300px;
      overflow-y: auto;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #ffffff44;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.75rem;
      color: #334155;
      border-top: 1px solid #1E293B;
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <h1>🛡️ Patch<span>Guard</span></h1>
  <span id="last-update">Loading...</span>
</header>

<!-- Global status -->
<div id="global-status" class="status-load">⏳ Chargement du statut...</div>

<!-- Server cards -->
<div class="grid" id="cards-grid">
  <!-- Injected by JS -->
</div>

<!-- Action buttons -->
<div class="actions">
  <button class="btn btn-teal" onclick="refreshAll()">🔄 Rafraîchir</button>
  <button class="btn btn-blue" id="btn-check" onclick="ansibleCheck()">🔍 Vérifier (sans modifier)</button>
  <button class="btn btn-red"  id="btn-apply" onclick="ansibleApply()">⚡ Appliquer les correctifs</button>
  <button class="btn btn-gray" onclick="toggleLogs()">📋 Voir les logs</button>
</div>

<!-- Logs panel -->
<div id="logs-panel">
  <h3>📋 Journal d'exécution cron</h3>
  <div id="logs-content">Chargement...</div>
</div>

<!-- Output panel -->
<div id="output-panel">
  <h3 id="output-title">📤 Résultat</h3>
  <div id="output-content"></div>
</div>

<footer>PatchGuard v1.0 — MIT License — Sauti RAYMOND — EIC Namur 2025–2026</footer>

<script>
const API = '';  // same origin

// ── Fetch helpers ─────────────────────────────────────────────────────────────
async function get(path) {
  const r = await fetch(API + path);
  return r.json();
}
async function post(path) {
  const r = await fetch(API + path, { method: 'POST' });
  return r.json();
}

// ── Build server card ─────────────────────────────────────────────────────────
function buildCard(name, statusData, patchData, lynisData) {
  const s = statusData?.servers?.[name];
  const p = patchData?.patches?.[name];
  const l = lynisData?.lynis?.[name];

  const online   = s?.online ?? false;
  const patches  = p?.patches ?? 0;
  const score    = l?.score ?? 0;
  const host     = s?.host ?? '';

  const hasAlert = online && patches > 0;
  const cardClass = !online ? 'offline' : hasAlert ? 'alert' : 'online';
  const badgeClass = !online ? 'badge-offline' :
                     hasAlert ? 'badge-alert' : 'badge-online';
  const badgeText  = !online ? '🔴 HORS LIGNE' :
                     hasAlert ? `🔴 ${patches} correctif(s)` : '🟢 EN LIGNE';
  const patchClass = patches === 0 ? 'patches-zero' : 'patches-alert';

  return `
    <div class="card ${cardClass}">
      <div class="card-header">
        <span class="card-name">${name}</span>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="card-row">
        <span>Adresse IP</span>
        <span>${host}</span>
      </div>
      <div class="card-row">
        <span>Correctifs</span>
        <span class="patches-num ${patchClass}">${patches}</span>
      </div>
      <div class="card-row">
        <span>Hardening Index</span>
        <span>${score} / 100</span>
      </div>
      <div class="lynis-bar">
        <div class="lynis-fill" style="width:${score}%"></div>
      </div>
    </div>`;
}

// ── Refresh all data ──────────────────────────────────────────────────────────
async function refreshAll() {
  document.getElementById('global-status').className = 'status-load';
  document.getElementById('global-status').innerHTML = '⏳ Chargement...';

  try {
    const [statusData, patchData, lynisData] = await Promise.all([
      get('/api/status'),
      get('/api/patches'),
      get('/api/lynis'),
    ]);

    // Build cards
    const names = Object.keys(statusData.servers);
    let html = '';
    let totalAlerts = 0;
    let allOnline = true;

    for (const name of names) {
      html += buildCard(name, statusData, patchData, lynisData);
      if (!statusData.servers[name].online) allOnline = false;
      if ((patchData.patches[name]?.patches ?? 0) > 0) totalAlerts++;
    }

    document.getElementById('cards-grid').innerHTML = html;

    // Global status
    const gs = document.getElementById('global-status');
    if (!allOnline) {
      gs.className = 'global-status status-alert';
      gs.innerHTML = '🔴 ATTENTION — Une ou plusieurs machines sont HORS LIGNE';
    } else if (totalAlerts > 0) {
      gs.className = 'global-status status-alert';
      gs.innerHTML = `🔴 ATTENTION — ${totalAlerts} machine(s) avec des correctifs en attente`;
    } else {
      gs.className = 'global-status status-ok';
      gs.innerHTML = '🟢 TOUT EST À JOUR — Aucune alerte détectée';
    }

    // Timestamp
    const now = new Date().toLocaleString('fr-BE');
    document.getElementById('last-update').textContent = `Dernière MAJ : ${now}`;

  } catch(e) {
    document.getElementById('global-status').innerHTML = '❌ Erreur de connexion à l\'API';
  }
}

// ── Ansible check ─────────────────────────────────────────────────────────────
async function ansibleCheck() {
  const btn = document.getElementById('btn-check');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Vérification...';
  showOutput('🔍 Vérification Ansible en cours...', '⏳ Connexion aux serveurs...');
  try {
    const data = await post('/api/ansible/check');
    showOutput('🔍 Résultat — Vérification Ansible', data.output);
  } catch(e) {
    showOutput('❌ Erreur', e.toString());
  }
  btn.disabled = false;
  btn.innerHTML = '🔍 Vérifier (sans modifier)';
}

// ── Ansible apply ─────────────────────────────────────────────────────────────
async function ansibleApply() {
  if (!confirm('⚠️ Appliquer les correctifs sur TOUTES les machines ?\nCette action peut redémarrer certains serveurs.')) return;
  const btn = document.getElementById('btn-apply');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Application en cours...';
  showOutput('⚡ Application des correctifs en cours...', '⏳ Ansible contacte les serveurs...');
  try {
    const data = await post('/api/ansible/apply');
    showOutput('⚡ Résultat — Application des correctifs', data.output);
    await refreshAll();
  } catch(e) {
    showOutput('❌ Erreur', e.toString());
  }
  btn.disabled = false;
  btn.innerHTML = '⚡ Appliquer les correctifs';
}

// ── Toggle logs ───────────────────────────────────────────────────────────────
async function toggleLogs() {
  const panel = document.getElementById('logs-panel');
  if (panel.style.display === 'block') {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  const data = await get('/api/logs?lines=30');
  document.getElementById('logs-content').textContent =
    data.logs.join('\n') || 'Aucun log disponible';
}

// ── Show output panel ─────────────────────────────────────────────────────────
function showOutput(title, content) {
  document.getElementById('output-panel').style.display = 'block';
  document.getElementById('output-title').textContent = title;
  document.getElementById('output-content').textContent = content;
}

// ── Auto-refresh every 60 seconds ────────────────────────────────────────────
refreshAll();
setInterval(refreshAll, 60000);

// ── Register Service Worker (PWA) ────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js')
    .then(() => console.log('Service Worker registered'))
    .catch(e => console.log('SW error:', e));
}
</script>
</body>
</html>
