---
# ============================================================
# verifier_windows.yml
# Verification des mises a jour disponibles sur Windows Server
# PatchGuard v2.0 — ansible.windows collection
# ============================================================

- name: Verification des mises a jour Windows
  hosts: serveurs_windows
  gather_facts: yes
  tasks:

    - name: Collecter les informations systeme
      ansible.windows.win_shell: |
        $os = Get-WmiObject Win32_OperatingSystem
        Write-Output "OS: $($os.Caption)"
        Write-Output "Version: $($os.Version)"
        Write-Output "Uptime: $([int]($os.ConvertToDateTime($os.LastBootUpTime) | ForEach-Object { (Get-Date) - $_ } | Select-Object -ExpandProperty TotalHours)) heures"
      register: system_info

    - name: Rechercher les mises a jour disponibles
      ansible.windows.win_updates:
        state: searched
        category_names:
          - SecurityUpdates
          - CriticalUpdates
          - UpdateRollups
      register: updates_result

    - name: Afficher le resume des mises a jour
      ansible.builtin.debug:
        msg:
          - "Machine        : {{ inventory_hostname }}"
          - "Systeme        : {{ ansible_os_name | default('Windows Server') }}"
          - "Mises a jour   : {{ updates_result.found_update_count }} disponible(s)"
          - "Securite       : {{ updates_result.updates | dict2items | selectattr('value.categories', 'contains', 'Security Updates') | list | length }} correctif(s)"
          - "Redemarrage    : {{ updates_result.reboot_required }}"
