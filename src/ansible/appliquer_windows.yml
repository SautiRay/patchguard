---
# ============================================================
# appliquer_windows.yml
# Application des mises a jour de securite Windows Server
# PatchGuard v2.0 — ansible.windows collection
# ============================================================

- name: Application des correctifs Windows
  hosts: serveurs_windows
  gather_facts: yes
  tasks:

    - name: Mettre a jour la liste des paquets
      ansible.windows.win_updates:
        state: searched
      register: updates_found

    - name: Afficher le nombre de mises a jour trouvees
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} : {{ updates_found.found_update_count }} mise(s) a jour trouvee(s)"

    - name: Appliquer les mises a jour de securite
      ansible.windows.win_updates:
        state: installed
        category_names:
          - SecurityUpdates
          - CriticalUpdates
        reboot: no
      register: install_result
      when: updates_found.found_update_count > 0

    - name: Sauvegarder le resultat dans un journal
      ansible.windows.win_shell: |
        $date = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
        $msg = "[$date] {{ inventory_hostname }} — {{ install_result.installed_update_count | default(0) }} correctif(s) applique(s)"
        Add-Content -Path "C:\PatchGuard\patch-manager.log" -Value $msg
      when: updates_found.found_update_count > 0

    - name: Verifier si un redemarrage est necessaire
      ansible.windows.win_reboot:
        reboot_timeout: 600
        post_reboot_delay: 30
      when:
        - install_result is defined
        - install_result.reboot_required | default(false)

    - name: Confirmer que la machine est operationnelle
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} est de nouveau en ligne et a jour"
